version: '3.8'

services:
  work-report:
    image: ghcr.io/yamonc/report:latest
    container_name: work-report
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    environment:
      - PORT=8080
      - DB_PATH=/data
      - JWT_SECRET=${JWT_SECRET:-report-jwt-secret}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
